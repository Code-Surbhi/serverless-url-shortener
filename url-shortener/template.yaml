AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Serverless URL Shortener - Production-grade architecture

Globals:
  Function:
    Timeout: 10
    Runtime: nodejs20.x
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref UrlMappingsTable
        NODE_OPTIONS: "--enable-source-maps"

Resources:
  # DynamoDB Table - stores slug -> URL mappings
  UrlMappingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: url-shortener-mappings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: slug
          KeyType: HASH
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl
      Tags:
        - Key: Project
          Value: serverless-url-shortener

  # API Gateway REST API
  UrlShortenerApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: url-shortener-api
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'GET,POST,OPTIONS'"

  # Lambda Function - Shorten URL
  ShortenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: url-shortener-shorten
      CodeUri: functions/shorten/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UrlMappingsTable
      Events:
        ShortenApi:
          Type: Api
          Properties:
            Path: /shorten
            Method: POST
            RestApiId: !Ref UrlShortenerApi

  # Lambda Function - Redirect
  RedirectFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: url-shortener-redirect
      CodeUri: functions/redirect/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UrlMappingsTable
      Events:
        RedirectApi:
          Type: Api
          Properties:
            Path: /{slug}
            Method: GET
            RestApiId: !Ref UrlShortenerApi

Outputs:
  ApiGatewayUrl:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${UrlShortenerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
  UrlMappingsTableName:
    Description: DynamoDB table storing URL mappings
    Value: !Ref UrlMappingsTable
  ShortenFunctionArn:
    Description: ARN of the Shorten Lambda function
    Value: !GetAtt ShortenFunction.Arn
  RedirectFunctionArn:
    Description: ARN of the Redirect Lambda function
    Value: !GetAtt RedirectFunction.Arn
